name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: wsl-claude-toast-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            asset: wsl-claude-toast-linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation toolchain (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat <<'EOF' > .cargo/config.toml
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/wsl-claude-toast \
            dist/${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Extract changelog section
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME#v}"
          awk -v ver="$tag" '
            /^## \[/{ if (found) exit; if (index($0, "[" ver "]")) { found=1; next } }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes.md
          draft: false
          prerelease: false
